<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMLYBZNS - Social Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        .logo {
            margin-bottom: 40px;
            font-size: 48px;
            font-weight: bold;
            color: #333;
        }

        .social-links {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-icon {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            border-radius: 50%;
            text-decoration: none;
            color: #000;
            font-size: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 2px solid #000;
        }

        .social-icon:hover {
            transform: scale(1.2) translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 600px) {
            .social-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }

            .social-links {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">FMLYBZNS</div>
        <div class="social-links">
            <a href="https://soundcloud.com/fmlybzns" class="social-icon" title="SoundCloud" target="_blank">
                <i class="fab fa-soundcloud"></i>
            </a>
            <a href="https://www.tiktok.com/@fmlybzns" class="social-icon" title="TikTok" target="_blank">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://www.youtube.com/@FMLYBZNS" class="social-icon" title="YouTube" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://www.instagram.com/fmlybzns_/" class="social-icon" title="Instagram" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>
</body>
</html>
