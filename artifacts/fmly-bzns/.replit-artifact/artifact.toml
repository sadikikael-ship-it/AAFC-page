kind = "web"
previewPath = "/"
title = "FMLY BZNS"
version = "1.0.0"
id = "artifacts/fmly-bzns"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22076

[services.development]
run = "pnpm --filter @workspace/fmly-bzns run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fmly-bzns", "run", "build" ]
publicDir = "artifacts/fmly-bzns/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22076"
BASE_PATH = "/"
